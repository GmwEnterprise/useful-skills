[project]
name = "docx"
version = "0.1.0"
description = "Read .docx files into Markdown and write .docx files from Markdown"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "markdown-it-py>=3.0.0",
    "python-docx>=1.1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.8.0",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[[tool.uv.index]]
url = "https://mirrors.aliyun.com/pypi/simple/"
default = true
